<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IslamicTube Pro</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>

<!-- ================= NAVBAR ================= -->

<header class="navbar">

    <div class="left-nav">

        <button id="menu-btn">
            ☰
        </button>

        <h2>
            🕌 IslamicTube
        </h2>

    </div>

    <div class="search">

        <input
        type="text"
        id="searchInput"
        placeholder="Search Islamic videos">

        <button id="searchBtn">
            <span class="material-icons">
                search
            </span>
        </button>

    </div>

    <div class="right-nav">


      <button onclick="location.href='favorites.html'">
❤️ Favorites
</button>
        <button id="darkBtn">
            🌙
        </button>

        <button class="login-btn">
            Login
        </button>

    </div>

</header>

<!-- ================= MAIN ================= -->

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <a href="#">🏠 Home</a>
        <a href="#">📖 Quran</a>
        <a href="#">📚 Tafsir</a>
        <a href="#">📜 Hadith</a>
        <a href="#">🎤 Lectures</a>
        <a href="scholars.html">👳 Scholars</a>
        <a href="favorites.html">❤️ Favorites</a>
        <a href="#">ℹ About</a>

    </aside>

    <!-- Main Content -->

    <main class="content">

        <!-- Hero -->

        <section class="hero">

            <h1>
                Welcome to IslamicTube
            </h1>

            <p>

                Watch authentic Islamic lectures,
                Quran recitations,
                Tafsir,
                Hadith lessons,
                and educational videos.

            </p>

        </section>

        <!-- Categories -->

        <section class="categories">

<button onclick="openCategory('Quran')">
📖 Quran
</button>

<button onclick="openCategory('Tafsir')">
📚 Tafsir
</button>

<button onclick="openCategory('Hadith')">
📜 Hadith
</button>

<button onclick="openCategory('Aqeedah')">
🕌 Aqeedah
</button>

<button onclick="openCategory('Fiqh')">
⚖️ Fiqh
</button>

<button onclick="openCategory('Seerah')">
📖 Seerah
</button>

<button onclick="openCategory('Arabic')">
🗣️ Arabic
</button>

</section>
        <!-- Videos -->

        <section>

            <h2>Featured Videos</h2>

            <div id="video-container" class="video-grid">

                <!-- API videos appear here -->

            </div>

        </section>

    </main>

</div>

<footer>

    © 2026 IslamicTube Pro

</footer>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/api.js"></script>

</body>
</html>
