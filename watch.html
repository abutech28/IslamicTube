<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Video</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .watch-page{
            max-width:1200px;
            margin:100px auto;
            padding:20px;
        }

        iframe{
            width:100%;
            height:650px;
            border:none;
            border-radius:15px;
        }
    </style>

</head>
<body>

<header class="navbar">

    <div class="left-nav">

        <h2>🕌 IslamicTube</h2>

    </div>

</header>

<div class="watch-page">

    <div class="video-player">

        <iframe
            id="player"
            allowfullscreen>
        </iframe>

        <h2 id="videoTitle">
            Loading...
        </h2>

        <p id="channelName"></p>

    </div>

    <aside class="related-videos">

        <h3>Related Videos</h3>

        <div id="relatedContainer"></div>

    </aside>

</div>

<script src="js/config.js"></script>
<script src="js/watch.js"></script>

</body>
</html>
